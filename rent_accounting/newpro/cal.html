<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLC TA Office – January 2025</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: #f0f4f7;
    }
    /* TOP NAVIGATION BAR */
    .nav-bar {
        background-color: #002b4d;
        padding: 10px 20px;
        display: flex;
        align-items: center;
    }
    .nav-home {
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 14px;
        padding: 8px 15px;
        border-radius: 4px;
        background-color: rgba(255, 255, 255, 0.1);
        transition: 0.3s;
    }
    .nav-home:hover {
        background-color: #28a745; /* Turns green on hover to match highlights */
    }

    .top-header {
        background-color: #003a66;
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 24px;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .calendar-container {
        width: 95%;
        max-width: 900px;
        margin: 30px auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        padding: 20px;
    }
    .month-header {
        background-color: #0059b3;
        color: white;
        padding: 12px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        border-radius: 6px;
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
    }
    th {
        padding: 10px;
        color: #555;
        border-bottom: 2px solid #eee;
    }
    td {
        border: 1px solid #f0f0f0;
        height: 100px;
        vertical-align: top;
        padding-top: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
    }
    td:hover {
        background-color: #f9f9f9;
    }

    /* THE GREEN HIGHLIGHT OVERWRITE */
    .highlight-num {
        background-color: #28a745; 
        color: white !important;
        display: inline-block;
        width: 35px;
        height: 35px;
        line-height: 35px;
        border-radius: 50%;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .sub-label {
        display: block;
        font-size: 10px;
        color: #1e7e34;
        font-weight: bold;
        text-transform: uppercase;
    }

    .sunday-text {
        color: #d93025;
        font-weight: bold;
    }
    
    .events-panel {
        margin-top: 25px;
        padding: 15px;
        border-radius: 8px;
        background-color: #f8f9fa;
        border-left: 6px solid #28a745;
    }

    .footer {
        text-align: center;
        font-size: 12px;
        color: #888;
        padding: 20px 0;
    }
</style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="nav-home">🏠 HOME</a>
</div>

<div class="top-header">NLC India Ltd - TA Office</div>

<div class="calendar-container">
    <div class="month-header">January 2025</div>
    <table>
        <thead>
            <tr>
                <th class="sunday-text">Sun</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
            </tr>
        </thead>
        <tbody id="calendar-body"></tbody>
    </table>

    <div class="events-panel">
        <h3 id="eventDate" style="margin-top:0; color:#003a66;">Office Schedule</h3>
      <p id="eventText">Click on any date to see full details.</p>
    </div>
</div>

<div class="footer">© 2025 NLC India Ltd. All Rights Reserved.</div>

<script>
    const eventData = {
        1: { label: "NEW YEAR", desc: "New Year Day Office Holiday" },
        8: { label: "REVIEW", desc: "Internal Review Meeting" },
        15: { label: "PONGAL", desc: "Pongal Festival Holiday" },
        22: { label: "STATUS", desc: "Project Status Update Meeting" },
        26: { label: "REPUBLIC", desc: "Republic Day - National Holiday" }
    };

    function generateCalendar() {
        const tbody = document.getElementById('calendar-body');
        let date = 1;
        // 1st Jan is Thursday, so startDay is 4
        let startDay = 4; 

        for (let i = 0; i < 6; i++) {
            let row = document.createElement('tr');
            for (let j = 0; j < 7; j++) {
                let cell = document.createElement('td');
                
                if (i === 0 && j < startDay) {
                    cell.innerHTML = "";
                } else if (date > 31) {
                    cell.innerHTML = "";
                } else {
                    const isSunday = (j === 0);
                    const event = eventData[date];

                    let html = "";
                    if (event) {
                        html = `<span class="highlight-num">${date}</span><br><span class="sub-label">${event.label}</span>`;
                    } else {
                        html = `<span class="${isSunday ? 'sunday-text' : ''}">${date}</span>`;
                    }

                    cell.innerHTML = html;
                    
                    // Scope current variables for the click event
                    let currentDay = date;
                    let currentIsSunday = isSunday;
                    let currentEvent = event;

                    cell.onclick = () => {
                        document.getElementById("eventDate").innerText = currentDay + " January, 2025";
                        
                        // Decision logic for the description text
                        if (currentEvent) {
                            document.getElementById("eventText").innerText = currentEvent.desc;
                        } else if (currentIsSunday) {
                            document.getElementById("eventText").innerText = "Holiday";
                        } else {
                            document.getElementById("eventText").innerText = "Working Day";
                        }
                    };
                    date++;
                }
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }
    }

    generateCalendar();
</script>
</body>
</html>
